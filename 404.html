<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found - HolmesGPT Documentation</title>
  <link rel="icon" href="/latest/assets/favicon.png">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .container {
      text-align: center;
      max-width: 520px;
      padding: 2rem;
    }
    .logo { height: 48px; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.75rem; }
    p { color: #666; line-height: 1.6; margin-bottom: 1rem; }
    .countdown { color: #009688; font-weight: 600; }
    a {
      color: #009688;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { text-decoration: underline; }
    .home-link { display: inline-block; margin-top: 0.5rem; }
  </style>
  <script>
    (function() {
      var path = window.location.pathname;

      // If already under a versioned prefix, this is a genuinely missing page
      var versionedPrefixes = ["/latest/", "/dev/"];
      var isVersioned = versionedPrefixes.some(function(p) { return path.startsWith(p); })
        || /^\/\d+\.\d+/.test(path);

      if (!isVersioned) {
        // Root-level URL — silently redirect to /latest/ equivalent
        window.location.replace("/latest" + path + window.location.search + window.location.hash);
      }
      // If versioned, fall through to show the 404 page
    })();
  </script>
</head>
<body>
  <div class="container">
    <img class="logo" src="/latest/assets/logo.png" alt="HolmesGPT" onerror="this.style.display='none'">
    <h1>Page not found</h1>
    <p>
      The page you're looking for doesn't exist or may have been moved.
    </p>
    <p>
      Redirecting to the home page in <span class="countdown" id="countdown">5</span> seconds...
    </p>
    <a class="home-link" href="/latest/">Go to documentation home</a>
  </div>
  <script>
    var seconds = 5;
    var el = document.getElementById('countdown');
    var timer = setInterval(function() {
      seconds--;
      el.textContent = seconds;
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.replace("/latest/");
      }
    }, 1000);
  </script>
</body>
</html>
