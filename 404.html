<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting</title>
  <script>
    // Redirect root-level URLs to /latest/ equivalent
    // e.g. /data-sources/builtin-toolsets/grafanaloki/ -> /latest/data-sources/builtin-toolsets/grafanaloki/
    var path = window.location.pathname;
    // Known versioned prefixes — don't redirect if already under one
    var versionedPrefixes = ["/latest/", "/dev/"];
    var isVersioned = versionedPrefixes.some(function(p) { return path.startsWith(p); })
      || /^\/\d+\.\d+/.test(path);  // matches /0.24.1/... etc.
    if (!isVersioned) {
      window.location.replace("/latest" + path + window.location.search + window.location.hash);
    }
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/latest/" />
  </noscript>
</head>
<body>
  Redirecting to <a href="/latest/">latest documentation</a>...
</body>
</html>
