{{- if .Values.mcpAddons.confluenceMcp.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-confluence-mcp-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-confluence-mcp
    app.kubernetes.io/name: confluence-mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: holmes
data:
  TRANSPORT: "sse"
  CONFLUENCE_URL: {{ required "mcpAddons.confluenceMcp.config.url is required" .Values.mcpAddons.confluenceMcp.config.url | quote }}
  {{- if .Values.mcpAddons.confluenceMcp.config.enabledTools }}
  ENABLED_TOOLS: {{ .Values.mcpAddons.confluenceMcp.config.enabledTools | quote }}
  {{- end }}
  {{- if .Values.mcpAddons.confluenceMcp.config.readOnly }}
  READ_ONLY_MODE: "true"
  {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-confluence-mcp-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-confluence-mcp
    app.kubernetes.io/name: confluence-mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: holmes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-confluence-mcp
      app.kubernetes.io/name: confluence-mcp-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-confluence-mcp
        app.kubernetes.io/name: confluence-mcp-server
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: mcp-server
        app.kubernetes.io/part-of: holmes
      annotations:
        checksum/config: {{ .Values.mcpAddons.confluenceMcp | toYaml | sha256sum }}
    spec:
      {{- if .Values.mcpAddons.confluenceMcp.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.mcpAddons.confluenceMcp.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.mcpAddons.confluenceMcp.tolerations }}
      tolerations:
        {{- toYaml .Values.mcpAddons.confluenceMcp.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.mcpAddons.confluenceMcp.affinity }}
      affinity:
        {{- toYaml .Values.mcpAddons.confluenceMcp.affinity | nindent 8 }}
      {{- end }}
      initContainers:
      # Fails fast with a clear message if the wrong Atlassian token type is mounted.
      # mcp-atlassian only does HTTP Basic against the tenant URL, which doesn't work with
      # scoped service-account tokens (prefix "ATSTT") — those need the Atlassian API gateway
      # with Bearer auth, which this addon doesn't expose. Without this check the pod boots
      # fine and 401s only appear later, mid-investigation, with no actionable error.
      - name: validate-token
        image: "{{ .Values.mcpAddons.confluenceMcp.registry }}/{{ .Values.mcpAddons.confluenceMcp.image }}"
        imagePullPolicy: {{ .Values.mcpAddons.confluenceMcp.imagePullPolicy | default "IfNotPresent" }}
        command:
        - sh
        - -c
        - |
          if [ -z "$CONFLUENCE_API_TOKEN" ]; then
            echo "ERROR: CONFLUENCE_API_TOKEN is empty. Check that secret '{{ .Values.mcpAddons.confluenceMcp.auth.secretName }}' exists and has key '{{ .Values.mcpAddons.confluenceMcp.auth.tokenKey | default "confluence-api-token" }}'." >&2
            exit 1
          fi
          case "$CONFLUENCE_API_TOKEN" in
            ATSTT*)
              echo "ERROR: This is a scoped service-account API token (prefix 'ATSTT')." >&2
              echo "" >&2
              echo "The Confluence MCP addon (mcpAddons.confluenceMcp) only supports HTTP Basic auth" >&2
              echo "against the tenant URL. Scoped tokens require Bearer auth via the Atlassian API" >&2
              echo "gateway, which this addon does not expose, so they will always return 401." >&2
              echo "" >&2
              echo "Fix one of the following:" >&2
              echo "  1. Generate a personal API token (prefix 'ATATT') at" >&2
              echo "     https://id.atlassian.com/manage-profile/security/api-tokens" >&2
              echo "     and replace the value in secret '{{ .Values.mcpAddons.confluenceMcp.auth.secretName }}'" >&2
              echo "     under key '{{ .Values.mcpAddons.confluenceMcp.auth.tokenKey | default "confluence-api-token" }}'." >&2
              echo "  2. Disable mcpAddons.confluenceMcp and enable the built-in 'toolsets.confluence'" >&2
              echo "     instead — it supports scoped service-account tokens transparently." >&2
              exit 1
              ;;
          esac
        env:
        - name: CONFLUENCE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mcpAddons.confluenceMcp.auth.secretName }}
              key: {{ .Values.mcpAddons.confluenceMcp.auth.tokenKey | default "confluence-api-token" }}
      containers:
      - name: confluence-mcp
        image: "{{ .Values.mcpAddons.confluenceMcp.registry }}/{{ .Values.mcpAddons.confluenceMcp.image }}"
        imagePullPolicy: {{ .Values.mcpAddons.confluenceMcp.imagePullPolicy | default "IfNotPresent" }}
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: TRANSPORT
          valueFrom:
            configMapKeyRef:
              name: {{ .Release.Name }}-confluence-mcp-config
              key: TRANSPORT
        - name: CONFLUENCE_URL
          valueFrom:
            configMapKeyRef:
              name: {{ .Release.Name }}-confluence-mcp-config
              key: CONFLUENCE_URL
        - name: CONFLUENCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ required "mcpAddons.confluenceMcp.auth.secretName is required" .Values.mcpAddons.confluenceMcp.auth.secretName }}
              key: {{ .Values.mcpAddons.confluenceMcp.auth.usernameKey | default "confluence-username" }}
        - name: CONFLUENCE_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mcpAddons.confluenceMcp.auth.secretName }}
              key: {{ .Values.mcpAddons.confluenceMcp.auth.tokenKey | default "confluence-api-token" }}
        {{- if .Values.mcpAddons.confluenceMcp.config.enabledTools }}
        - name: ENABLED_TOOLS
          valueFrom:
            configMapKeyRef:
              name: {{ .Release.Name }}-confluence-mcp-config
              key: ENABLED_TOOLS
        {{- end }}
        {{- if .Values.mcpAddons.confluenceMcp.config.readOnly }}
        - name: READ_ONLY_MODE
          value: "true"
        {{- end }}
        resources:
          {{- toYaml .Values.mcpAddons.confluenceMcp.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-confluence-mcp-server
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-confluence-mcp
    app.kubernetes.io/name: confluence-mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: mcp-server
    app.kubernetes.io/part-of: holmes
spec:
  selector:
    app: {{ .Release.Name }}-confluence-mcp
    app.kubernetes.io/name: confluence-mcp-server
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
{{- end }}
