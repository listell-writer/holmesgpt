description: |
  PagerDuty webhook payload with the cluster encoded in custom_details.
  This is a different shape from Robusta and Prometheus formats and the
  model must recognize it.
available_clusters:
  - prod
  - staging
conversation_history:
  - role: user
    content: |
      Incident: high-error-rate
      Service: api-gateway
      Status: triggered
      Custom Details:
        cluster: prod
        namespace: default
        error_rate: 0.15
expected_cluster: prod
tags:
  - medium
