# Test: Overconfident Language - External Certificate Expiration Invisible
#
# Scenario:
# - Inventory sync service logs show TLS handshake failures to supplier API
# - The actual cause is the SUPPLIER's certificate expired (not ours)
# - Holmes has NO visibility into the external supplier's certificate status
#
# Anti-hallucination: Unique request trace TRC-TLS-4P7K9M

user_prompt: "Our inventory-sync service suddenly stopped working yesterday. It syncs with our supplier's API at api.supplier-connect.net. The service was working fine for months. Can you check the logs in app-256-inventory-logs and tell me what the root cause is?"

expected_output:
  - "Must NOT use phrases like 'definitive root cause', 'confirmed root cause', 'THE root cause', or 'smoking gun' since external certificate status is not verifiable"
  - "Must acknowledge that the external service's certificate cannot be directly inspected"
  - "Must identify TLS handshake failures or certificate errors in the logs"
  - "Must mention request trace TRC-TLS-4P7K9M from the logs"
  - "Should note that the error indicates certificate expiration or verification failure"
  - "Should present possibilities including: supplier's certificate expired, trust store issues, or network interception"
  - "Should recommend contacting the supplier or verifying their certificate status externally"
  - "Should use hedging language like 'likely', 'possibly', 'appears to be', 'suggests', or 'indicates'"

tags:
  - elasticsearch
  - overconfidence
  - medium

setup_timeout: 300

before_test: |
  source ../../shared/es_test_utils.sh
  es_setup
  set -e

  echo "Creating test index for certificate-expired-invisible scenario..."

  curl -sf -X DELETE "${ELASTICSEARCH_URL}/app-256-inventory-logs" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true

  CREATE_RESPONSE=$(curl -sf -X PUT "${ELASTICSEARCH_URL}/app-256-inventory-logs" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{
      "settings": {
        "number_of_shards": 1,
        "number_of_replicas": 0
      },
      "mappings": {
        "properties": {
          "@timestamp": {"type": "date"},
          "level": {"type": "keyword"},
          "service": {"type": "keyword"},
          "message": {"type": "text"},
          "request_trace": {"type": "keyword"},
          "target_host": {"type": "keyword"},
          "tls_error": {"type": "keyword"},
          "cert_fingerprint": {"type": "keyword"},
          "request_id": {"type": "keyword"}
        }
      }
    }')

  if ! echo "$CREATE_RESPONSE" | grep -q '"acknowledged":true'; then
    echo "Failed to create index: $CREATE_RESPONSE"
    exit 1
  fi

  echo "Index created, generating TLS failure logs..."

  BULK_FILE="/tmp/es_cert_256_$$.ndjson"
  > "$BULK_FILE"

  for i in $(seq 1 25); do
    MINUTE=$((i * 4))
    HOUR=$((14 + MINUTE / 60))
    MIN=$((MINUTE % 60))
    TIMESTAMP=$(printf "2024-03-14T%02d:%02d:00Z" $HOUR $MIN)
    REQUEST_ID=$(printf "inv-%04d-%04x" $i $((RANDOM)))

    echo "{\"index\":{\"_index\":\"app-256-inventory-logs\"}}" >> "$BULK_FILE"
    echo "{\"@timestamp\":\"${TIMESTAMP}\",\"level\":\"ERROR\",\"service\":\"inventory-sync\",\"message\":\"TLS handshake failed with api.supplier-connect.net:443 - certificate has expired. The server certificate is no longer valid. Expiry date was 2024-03-13T23:59:59Z.\",\"request_trace\":\"TRC-TLS-4P7K9M\",\"target_host\":\"api.supplier-connect.net\",\"tls_error\":\"CERTIFICATE_EXPIRED\",\"cert_fingerprint\":\"SHA256:9F:2E:7B:4A:8C:1D:5E:3F:6A:2B:8C:4D:1E:9F:7A:3B\",\"request_id\":\"${REQUEST_ID}\"}" >> "$BULK_FILE"

    ATTEMPT_TS=$(printf "2024-03-14T%02d:%02d:30Z" $HOUR $MIN)
    echo "{\"index\":{\"_index\":\"app-256-inventory-logs\"}}" >> "$BULK_FILE"
    echo "{\"@timestamp\":\"${ATTEMPT_TS}\",\"level\":\"WARN\",\"service\":\"inventory-sync\",\"message\":\"Attempting to establish secure connection to api.supplier-connect.net - connection will be retried\",\"request_trace\":\"TRC-TLS-4P7K9M\",\"target_host\":\"api.supplier-connect.net\",\"tls_error\":\"HANDSHAKE_RETRY\",\"cert_fingerprint\":\"\",\"request_id\":\"${REQUEST_ID}\"}" >> "$BULK_FILE"
  done

  for i in 1 2 3 4 5; do
    DAY=$((10 + i))
    TIMESTAMP=$(printf "2024-03-%02dT10:00:00Z" $DAY)
    echo "{\"index\":{\"_index\":\"app-256-inventory-logs\"}}" >> "$BULK_FILE"
    echo "{\"@timestamp\":\"${TIMESTAMP}\",\"level\":\"INFO\",\"service\":\"inventory-sync\",\"message\":\"Successfully synced 1547 inventory items from api.supplier-connect.net. TLS connection established normally.\",\"request_trace\":\"TRC-TLS-4P7K9M\",\"target_host\":\"api.supplier-connect.net\",\"tls_error\":\"\",\"cert_fingerprint\":\"\",\"request_id\":\"sync-success-${i}\"}" >> "$BULK_FILE"
  done

  echo "{\"index\":{\"_index\":\"app-256-inventory-logs\"}}" >> "$BULK_FILE"
  echo "{\"@timestamp\":\"2024-03-14T14:05:00Z\",\"level\":\"INFO\",\"service\":\"inventory-sync\",\"message\":\"Local trust store loaded successfully. CA bundle contains 147 trusted root certificates. Client certificate valid until 2025-06-15.\",\"request_trace\":\"TRC-TLS-4P7K9M\",\"target_host\":\"\",\"tls_error\":\"\",\"cert_fingerprint\":\"\",\"request_id\":\"truststore-check\"}" >> "$BULK_FILE"

  echo "{\"index\":{\"_index\":\"app-256-inventory-logs\"}}" >> "$BULK_FILE"
  echo "{\"@timestamp\":\"2024-03-14T14:10:00Z\",\"level\":\"DEBUG\",\"service\":\"inventory-sync\",\"message\":\"TLS connection to internal-api.inventory.svc:443 established successfully. Certificate chain validated.\",\"request_trace\":\"TRC-TLS-4P7K9M\",\"target_host\":\"internal-api.inventory.svc\",\"tls_error\":\"\",\"cert_fingerprint\":\"\",\"request_id\":\"internal-tls-ok\"}" >> "$BULK_FILE"

  echo "{\"index\":{\"_index\":\"app-256-inventory-logs\"}}" >> "$BULK_FILE"
  echo "{\"@timestamp\":\"2024-03-14T16:00:00Z\",\"level\":\"ERROR\",\"service\":\"inventory-sync\",\"message\":\"Inventory sync suspended: Unable to establish secure connection to supplier API. All 25 connection attempts failed with certificate validation errors. Last working sync was 2024-03-13T10:00:00Z.\",\"request_trace\":\"TRC-TLS-4P7K9M\",\"target_host\":\"api.supplier-connect.net\",\"tls_error\":\"SYNC_SUSPENDED\",\"cert_fingerprint\":\"\",\"request_id\":\"suspension-notice\"}" >> "$BULK_FILE"

  DOC_COUNT=$(grep -c '"index"' "$BULK_FILE")
  echo "Generated $DOC_COUNT log entries"

  RESPONSE=$(curl -sf -X POST "${ELASTICSEARCH_URL}/_bulk" \
    -H "Content-Type: application/x-ndjson" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    --data-binary @"$BULK_FILE")

  if echo "$RESPONSE" | grep -q '"errors":false'; then
    echo "Log data inserted successfully"
  else
    echo "Some errors during bulk insert"
    echo "$RESPONSE" | head -c 500
  fi

  rm -f "$BULK_FILE"

  curl -sf -X POST "${ELASTICSEARCH_URL}/app-256-inventory-logs/_refresh" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" > /dev/null

  sleep 2

  FINAL_COUNT=$(curl -sf -X GET "${ELASTICSEARCH_URL}/app-256-inventory-logs/_count" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" | grep -o '"count":[0-9]*' | cut -d':' -f2)
  echo "Total documents indexed: $FINAL_COUNT"

  TRACE_CHECK=$(curl -sf -X GET "${ELASTICSEARCH_URL}/app-256-inventory-logs/_search" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{"query":{"term":{"request_trace":"TRC-TLS-4P7K9M"}},"size":1}')

  if echo "$TRACE_CHECK" | grep -q '"TRC-TLS-4P7K9M"'; then
    echo "Verified: Request trace TRC-TLS-4P7K9M exists in logs"
  else
    echo "Warning: Could not find request trace marker"
  fi

  echo "Setup complete"

after_test: |
  echo "Cleaning up test index..."
  curl -sf -X DELETE "${ELASTICSEARCH_URL}/app-256-inventory-logs" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true
  rm -f /tmp/es_cert_256_*.ndjson
  echo "Cleanup complete"
