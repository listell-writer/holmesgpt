user_prompt: "The payment-api pod in namespace app-101 had issues on August 2, 2025 around 13:45 UTC. What happened?"

description: |
  This test verifies that Holmes can analyze historical logs from Loki even when
  the pod that generated the logs no longer exists. Runs Loki as a local Docker
  container and pushes logs directly — no Kubernetes cluster required. Holmes
  must rely entirely on the historical logs stored in Loki.

expected_output:
  - The payment-api pod experienced failures caused by database connection pool exhaustion

tags:
  - logs
  - easy
  - loki
  - regression

setup_timeout: 120

before_test: |
  # Clean up any leftover container from a previous run
  docker rm -f loki-101 2>/dev/null || true

  # Start Loki container (host networking avoids port-mapping issues in CI)
  docker run -d --name loki-101 \
    --network host \
    -v "$(pwd)/loki-config.yaml:/etc/loki/loki-config.yaml" \
    grafana/loki:2.9.0 \
    -config.file=/etc/loki/loki-config.yaml

  # Wait for Loki to be ready
  echo "Waiting for Loki to be ready..."
  for i in {1..30}; do
    if curl -sf http://localhost:3100/ready >/dev/null 2>&1; then
      echo "✅ Loki is ready!"
      break
    fi
    if [ $i -eq 30 ]; then
      echo "❌ Loki failed to become ready after 30s"
      docker logs loki-101 --tail 20
      exit 1
    fi
    sleep 1
  done

  # Push historical logs directly to Loki
  echo "Pushing historical logs..."
  python3 push_logs.py http://localhost:3100

  # Verify logs are queryable
  for i in {1..15}; do
    RESULT=$(curl -s --max-time 5 \
      "http://localhost:3100/loki/api/v1/query_range?query=%7Bnamespace%3D%22app-101%22%2Clevel%3D%22ERROR%22%7D&start=2025-08-02T13:00:00Z&end=2025-08-02T15:00:00Z&limit=1")
    if echo "$RESULT" | grep -q '"values"'; then
      echo "✅ Historical ERROR logs verified in Loki"
      exit 0
    fi
    if [ $i -eq 15 ]; then
      echo "❌ Logs not queryable after 15 attempts"
      echo "Last result: $RESULT"
      exit 1
    fi
    sleep 1
  done

after_test: |
  docker rm -f loki-101 || true
