# RED HERRING: a redis metrics exporter that crashloops because it can't reach a
# cache that isn't deployed. Unrelated to orders.
apiVersion: v1
kind: Secret
metadata:
  name: cache-exporter-app
  namespace: app-261
stringData:
  app.py: |
    import sys, time, datetime
    ts = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S.%fZ")
    print(f"{ts} INFO redis_exporter v1.55 starting", flush=True)
    time.sleep(1)
    ts = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S.%fZ")
    print(f"{ts} FATAL dial tcp redis-cache.app-261.svc:6379: connect: connection refused", flush=True)
    sys.exit(1)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cache-exporter
  namespace: app-261
  labels:
    app: cache-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cache-exporter
  template:
    metadata:
      labels:
        app: cache-exporter
    spec:
      containers:
        - name: cache-exporter
          image: python:3.11-slim
          command: ["python", "/app/app.py"]
          volumeMounts:
            - name: app
              mountPath: /app
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
