# High-volume gateway access logs with occasional 504/499 — dilutes log volume
# and adds more timeout-looking lines unrelated to the order-save failures.
apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-app
  namespace: app-261
stringData:
  app.py: |
    import time, random, datetime
    paths = ["/api/orders", "/api/search", "/api/cart", "/api/recommendations", "/healthz", "/api/billing"]
    def log(line):
        ts = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S.%fZ")
        print(f"{ts} {line}", flush=True)
    log("INFO nginx-gateway started worker_processes=4")
    while True:
        p = random.choice(paths)
        c = random.choices([200,200,200,200,304,502,504,499], k=1)[0]
        lvl = "INFO" if c < 400 else "WARN"
        log(f"{lvl} {c} GET {p} upstream_time={random.randint(2,900)}ms")
        time.sleep(0.25)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: app-261
  labels: {app: api-gateway}
spec:
  replicas: 1
  selector: {matchLabels: {app: api-gateway}}
  template:
    metadata: {labels: {app: api-gateway}}
    spec:
      containers:
        - name: api-gateway
          image: python:3.11-slim
          command: ["python", "/app/app.py"]
          volumeMounts: [{name: app, mountPath: /app}]
          resources: {requests: {cpu: 10m, memory: 24Mi}, limits: {cpu: 100m, memory: 64Mi}}
      volumes: [{name: app, secret: {secretName: api-gateway-app}}]
