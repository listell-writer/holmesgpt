apiVersion: v1
kind: Namespace
metadata:
  name: app-261
---
# TRUE ROOT CAUSE lives here, but it is a CASCADE and the obvious answer is wrong.
# The pool max (50) is reasonable. The pool saturates because every order
# transaction is abnormally slow (~2s) — audit-sync-writes=true forces a
# synchronous fsync per audit row inside each order transaction, holding DB
# connections open far too long. The real fix is to make audit writes async, NOT
# to keep growing the pool (which only masks the slow-transaction problem).
apiVersion: v1
kind: ConfigMap
metadata:
  name: orders-config
  namespace: app-261
data:
  connection-pool-max: "50"
  connection-acquire-timeout-ms: "250"
  db-host: "orders-db.app-261.svc"
  db-port: "5432"
  # When true, each audited write fsyncs every audit row synchronously inside the
  # order transaction, making each transaction take ~2 seconds.
  audit-sync-writes: "true"
  feature-async-fulfilment: "true"
---
apiVersion: v1
kind: Secret
metadata:
  name: orders-api-app
  namespace: app-261
stringData:
  app.py: |
    import os, time, random, datetime

    MAXC = os.environ.get("CONNECTION_POOL_MAX", "?")
    ACQ = os.environ.get("CONNECTION_ACQUIRE_TIMEOUT_MS", "?")
    AUDIT = os.environ.get("AUDIT_SYNC_WRITES", "?")

    def log(level, msg):
        ts = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S.%fZ")
        print(f"{ts} {level} {msg}", flush=True)

    VERSION = os.environ.get("APP_VERSION", "unknown")
    log("INFO", f"orders-api v{VERSION} starting; db pool initialised max={MAXC} (driver=pgx); audit_sync_writes={AUDIT}")
    log("INFO", "connected to orders-db.app-261.svc:5432 (db reachable, handshake ok)")

    oid = 80500
    while True:
        oid += 1
        # CASCADE: the pool (max=50) saturates only because each transaction is
        # abnormally slow. Successful saves log ~2s commit times with audit_sync=on
        # — that is the real cause. The failures report just the proximate symptom
        # (cannot acquire a connection in time). Reporting "pool too small / raise
        # the pool" as the root cause is the trap; the pool is adequately sized for
        # normal-speed transactions.
        saved = random.random() >= 0.22
        if saved:
            log("INFO", f"order persisted order=ORD-{oid} commit_ms={random.randint(1900,2400)} (audit_sync=on: fsync per audit row)")
            # RED HERRING: a loud post-commit event publish that fails because no
            # kafka broker is deployed. The order is ALREADY saved, so this does
            # not cause order failures, but it names a down dependency.
            if random.random() < 0.55:
                log("ERROR", f"order ORD-{oid} saved, but failed to publish order-created event to kafka topic orders.v1: broker orders-kafka.app-261.svc:9092 not available (code=KAFKA_PUBLISH_8c1f) — will retry asynchronously")
        else:
            log("ERROR", f"order ORD-{oid} not saved: timed out after {ACQ}ms acquiring a db connection (waiting={random.randint(6,14)}) err=ORD_POOL_7k3m9x")
        time.sleep(0.5)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-api
  namespace: app-261
  labels:
    app: orders-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orders-api
  template:
    metadata:
      labels:
        app: orders-api
    spec:
      containers:
        - name: orders-api
          image: python:3.11-slim
          command: ["python", "/app/app.py"]
          env:
            - name: APP_VERSION
              value: "2.6.0"
            - name: CONNECTION_POOL_MAX
              valueFrom:
                configMapKeyRef:
                  name: orders-config
                  key: connection-pool-max
            - name: CONNECTION_ACQUIRE_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: orders-config
                  key: connection-acquire-timeout-ms
            - name: AUDIT_SYNC_WRITES
              valueFrom:
                configMapKeyRef:
                  name: orders-config
                  key: audit-sync-writes
          volumeMounts:
            - name: app
              mountPath: /app
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 96Mi
      volumes:
        - name: app
          secret:
            secretName: orders-api-app
---
# RED HERRING: the database is HEALTHY but logs benign "connection reset by peer"
# lines (idle clients disconnecting) and routine checkpoints. Tempting to blame
# the DB, but it is not the cause.
apiVersion: v1
kind: Secret
metadata:
  name: orders-db-app
  namespace: app-261
stringData:
  app.py: |
    import time, random, datetime

    def log(msg):
        ts = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M:%S.%f UTC")
        print(f"{ts} [postgres] {msg}", flush=True)

    log("LOG:  database system is ready to accept connections")
    log("LOG:  autovacuum launcher started")
    while True:
        r = random.random()
        if r < 0.18:
            log("LOG:  could not receive data from client: Connection reset by peer")
        elif r < 0.30:
            log("LOG:  unexpected EOF on client connection with an open transaction")
        elif r < 0.40:
            log("LOG:  checkpoint complete: wrote 37 buffers (0.2%); 0 WAL file(s) added")
        else:
            log("LOG:  statement: COMMIT")
        time.sleep(0.8)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-db
  namespace: app-261
  labels:
    app: orders-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-db
  template:
    metadata:
      labels:
        app: orders-db
    spec:
      containers:
        - name: orders-db
          image: python:3.11-slim
          command: ["python", "/app/app.py"]
          volumeMounts:
            - name: app
              mountPath: /app
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: app
          secret:
            secretName: orders-db-app
---
apiVersion: v1
kind: Service
metadata:
  name: orders-db
  namespace: app-261
spec:
  selector:
    app: orders-db
  ports:
    - port: 5432
      targetPort: 5432
---
# RED HERRING: recommendations-api was deployed recently (rollout triggered in
# before_test) AND is OOMKilled/restarting. A classic "it broke right after a
# deploy" + "look, a crashing pod" distraction. Unrelated to order failures.
apiVersion: v1
kind: Secret
metadata:
  name: recommendations-api-app
  namespace: app-261
stringData:
  app.py: |
    import time, datetime
    ts = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S.%fZ")
    print(f"{ts} INFO recommendations-api starting; loading model into memory", flush=True)
    blocks = []
    while True:
        blocks.append(bytearray(3 * 1024 * 1024))
        time.sleep(0.1)
---
apiVersion: apps/v1
