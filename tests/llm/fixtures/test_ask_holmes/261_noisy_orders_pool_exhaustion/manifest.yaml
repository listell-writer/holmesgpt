metadata:
  name: payments-api-app
  namespace: app-261
stringData:
  app.py: |
    import time, random, datetime

    def log(level, msg):
        ts = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S.%fZ")
        print(f"{ts} {level} {msg}", flush=True)

    log("INFO", "payments-api starting listen=:8080")
    pid = 5000
    while True:
        pid += 1
        if random.random() < 0.4:
            log("WARN", f"upstream ledger call slow, retrying (attempt 2/3) pay=PAY-{pid}")
            log("INFO", f"payment captured on retry pay=PAY-{pid} latency_ms={random.randint(400,900)}")
        else:
            log("INFO", f"payment captured pay=PAY-{pid} latency_ms={random.randint(40,120)}")
        time.sleep(0.6)
---
