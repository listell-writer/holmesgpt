          volumeMounts:
            - name: app
              mountPath: /app
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 48Mi
      volumes:
        - name: app
          secret:
            secretName: recommendations-api-app
---
