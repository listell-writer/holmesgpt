      volumes: [{name: app, secret: {secretName: search-api-app}}]
---
# DECOY: this service logs a benign "connection pool nearing limit" WARN. It is
# healthy (active < max) and unrelated to orders, but it makes the word "pool"
# appear in the noise so the orders-api pool problem is not uniquely greppable.
apiVersion: v1
kind: ConfigMap
metadata:
  name: session-config
  namespace: app-261
data:
  redis-url: "redis://session-store-redis.app-261.svc:6379"
  pool-max: "50"
  ttl-seconds: "3600"
---
apiVersion: v1
kind: Secret
metadata:
  name: session-store-app
  namespace: app-261
stringData:
  app.py: |
    import time, random, datetime
    def log(level, msg):
        ts = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S.%fZ")
        print(f"{ts} {level} {msg}", flush=True)
    log("INFO", "session-store starting; redis pool initialised max=50")
    while True:
        if random.random() < 0.3:
            log("WARN", f"redis connection pool nearing limit (active={random.randint(40,49)} max=50)")
        else:
            log("INFO", f"session set ok keys={random.randint(1,5)}")
        time.sleep(0.8)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: session-store
  namespace: app-261
  labels: {app: session-store}
spec:
  replicas: 1
  selector: {matchLabels: {app: session-store}}
  template:
    metadata: {labels: {app: session-store}}
    spec:
      containers:
        - name: session-store
          image: python:3.11-slim
          command: ["python", "/app/app.py"]
          volumeMounts: [{name: app, mountPath: /app}]
          resources: {requests: {cpu: 10m, memory: 24Mi}, limits: {cpu: 100m, memory: 64Mi}}
      volumes: [{name: app, secret: {secretName: session-store-app}}]
---
# Crashlooping background worker (unreachable SMTP) — pure event/pod-state noise.
apiVersion: v1
kind: Secret
metadata:
  name: notification-worker-app
  namespace: app-261
stringData:
  app.py: |
    import sys, time, datetime
    ts = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S.%fZ")
    print(f"{ts} INFO notification-worker starting", flush=True)
    time.sleep(1)
    ts = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S.%fZ")
    print(f"{ts} FATAL cannot connect to smtp relay smtp.internal.svc:587: no route to host", flush=True)
    sys.exit(1)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-worker
  namespace: app-261
  labels: {app: notification-worker}
spec:
  replicas: 1
  selector: {matchLabels: {app: notification-worker}}
  template:
    metadata: {labels: {app: notification-worker}}
    spec:
      containers:
        - name: notification-worker
          image: python:3.11-slim
          command: ["python", "/app/app.py"]
          volumeMounts: [{name: app, mountPath: /app}]
          resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 100m, memory: 32Mi}}
      volumes: [{name: app, secret: {secretName: notification-worker-app}}]
---
