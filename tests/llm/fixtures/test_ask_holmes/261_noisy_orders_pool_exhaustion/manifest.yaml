---
# ============================================================================
# ADDITIONAL UNRELATED NOISE SERVICES
# A real "noisy microservice environment": many services, many configmaps, many
# error types firing at once. NONE of these are the cause of the order-save
# failures. They exist to bury the real signal (orders-api pool max=2 in
# orders-config) under a high volume of similar-looking timeout/connection/pool
# chatter and alarming pod states.
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: billing-config
  namespace: app-261
data:
  tax-service-url: "https://tax.internal.svc:8443"
  tax-timeout-ms: "2000"
  invoice-batch-size: "200"
---
apiVersion: v1
kind: Secret
metadata:
  name: billing-api-app
  namespace: app-261
stringData:
  app.py: |
    import time, random, datetime
    def log(level, msg):
        ts = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S.%fZ")
        print(f"{ts} {level} {msg}", flush=True)
    log("INFO", "billing-api starting listen=:8080")
    i = 0
    while True:
        i += 1
        if random.random() < 0.2:
            log("ERROR", f"tax-service call exceeded 2000ms deadline (code=TAX_TIMEOUT) invoice=INV-{i}")
        else:
            log("INFO", f"invoice issued invoice=INV-{i} amount={random.randint(10,900)}.99")
        time.sleep(0.7)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-api
  namespace: app-261
  labels: {app: billing-api}
spec:
  replicas: 1
  selector: {matchLabels: {app: billing-api}}
  template:
    metadata: {labels: {app: billing-api}}
    spec:
      containers:
        - name: billing-api
          image: python:3.11-slim
          command: ["python", "/app/app.py"]
          volumeMounts: [{name: app, mountPath: /app}]
          resources: {requests: {cpu: 10m, memory: 24Mi}, limits: {cpu: 100m, memory: 64Mi}}
      volumes: [{name: app, secret: {secretName: billing-api-app}}]
---
apiVersion: v1
kind: Secret
metadata:
  name: search-api-app
  namespace: app-261
stringData:
  app.py: |
    import time, random, datetime
    def log(level, msg):
        ts = datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%S.%fZ")
        print(f"{ts} {level} {msg}", flush=True)
    log("INFO", "search-api starting; connected to elasticsearch cluster (green)")
    while True:
        r = random.random()
        if r < 0.15:
            log("ERROR", "circuit breaker OPEN for index products-v4 (too many slow queries)")
        elif r < 0.45:
            log("WARN", f"elasticsearch query slow: took {random.randint(1200,2400)}ms shard={random.randint(0,4)}")
        else:
            log("INFO", f"search ok hits={random.randint(0,80)} took_ms={random.randint(5,60)}")
        time.sleep(0.6)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-api
  namespace: app-261
  labels: {app: search-api}
spec:
