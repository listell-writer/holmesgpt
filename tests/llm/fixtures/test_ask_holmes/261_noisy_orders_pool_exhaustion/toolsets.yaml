# Keep the Kubernetes observability toolsets (logs, events, describe, get) — which
# are all that's needed to read the orders-api logs and the orders-config
# ConfigMap — but DISABLE bash/internet/connectivity_check. Beyond matching a
# realistic read-only setup, disabling bash also closes an eval-integrity hole:
# with a shell the agent can fall back to reading the test fixture files on disk
# (manifest.yaml, etc.) and "discover" the answer from comments instead of
# investigating the live cluster.
toolsets:
  kubernetes/core:
    enabled: true
  kubernetes/logs:
    enabled: true
  internet:
    enabled: false
  connectivity_check:
    enabled: false
  bash:
    enabled: false
