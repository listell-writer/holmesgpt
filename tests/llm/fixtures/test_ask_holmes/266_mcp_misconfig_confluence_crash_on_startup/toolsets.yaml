toolsets:
  confluence-mcp:
    type: mcp
    enabled: true
    description: "Confluence MCP server for confluence operations"
    config:
      mode: stdio
      command: "python3"
      args:
        - "-c"
        - "import sys; sys.stderr.write('FATAL: required environment variable CONFLUENCE_API_TOKEN is not set; cannot start Confluence MCP server\n'); sys.exit(1)"
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
