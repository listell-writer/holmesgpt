# Test: SigNoz MCP log search
#
# Verifies HolmesGPT can discover and call the SigNoz MCP server's log tools
# to find an error in a specific service. The mock MCP server mirrors the real
# signoz-mcp-server (https://github.com/SigNoz/signoz-mcp-server) tool surface.
#
# Anti-hallucination: the error log embeds a unique verification code that
# Holmes can only discover by actually invoking signoz_search_logs and reading
# the returned log body. The verification code is not visible in the prompt.

user_prompt: >-
  The payment-api-257 service is failing. Search SigNoz logs for ERROR
  entries from that service, quote the full error log line, and report
  the verification code embedded in it (format SIGNOZ-EVAL-xxxxxxxx).

expected_output:
  - "Must call an MCP tool from the 'signoz' toolset to retrieve logs (e.g. signoz_search_logs)"
  - "Must report the verification code SIGNOZ-EVAL-7x9k2m4p exactly as it appears in the log"
  - "Must identify that the payment-api-257 service errors are caused by a payment gateway timeout after 30s"

include_tool_calls: true

tags:
  - mcp
  - logs
  - easy
