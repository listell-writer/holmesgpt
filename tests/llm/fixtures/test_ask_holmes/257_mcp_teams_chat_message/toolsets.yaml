# floriscornel/teams-mcp (stdio via npx) for Microsoft Teams chat/channel access.
#
# Auth: relies on the MCP's token cache file at $HOME/.teams-mcp-token-cache.json
# (+ auth metadata at $HOME/.msgraph-mcp-auth.json), which before_test decodes
# from the TEAMS_TOKEN_CACHE_TGZ_B64 secret. The MCP refreshes access tokens
# automatically using the cached refresh token (~90-day default lifetime), so
# no interactive re-auth is needed per run.
#
# Scopes required when first authenticating (before producing the cache):
#   User.Read, User.ReadBasic.All,
#   Chat.ReadWrite, ChatMessage.Send
# For a stricter read-only MCP, append --read-only to args (drops write scopes).
toolsets:
  teams-mcp:
    type: mcp
    enabled: true
    config:
      mode: stdio
      command: "npx"
      args: ["-y", "@floriscornel/teams-mcp@latest"]
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
