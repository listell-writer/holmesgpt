# Test: Microsoft Teams MCP - Holmes creates a chat + posts notes
# Verifies the end-to-end incident-chat-start flow via floriscornel's Teams
# MCP using delegated Microsoft Graph auth. Holmes is asked to search the
# directory for responders, create a new group chat with a unique topic,
# and post a message containing an incident reference code.
#
# Scope limited to chat-level delegated Graph scopes — no channel or team
# admin permissions needed.
#
# Requirements (env vars):
#   TEAMS_TOKEN_CACHE_TGZ_B64 - base64(tar -czf - -C $HOME \
#                                       .teams-mcp-token-cache.json \
#                                       .msgraph-mcp-auth.json)
#                               Produced by running
#                               `npx @floriscornel/teams-mcp@latest authenticate`
#                               once on a workstation. Bundles the MCP's
#                               token cache + auth metadata (client id,
#                               tenant, scopes). Contains a refresh token
#                               (~90-day lifetime by default), so CI does
#                               not need interactive re-auth on every run.
#                               Scopes at mint time:
#                                 User.Read, User.ReadBasic.All,
#                                 Chat.ReadWrite, ChatMessage.Send
#
# Reentrancy: each run creates a NEW chat with a Holmes-chosen unique
# topic suffix, so parallel runs never collide on the same resource.
# after_test is intentionally omitted — chats are lightweight and
# accumulate harmlessly; do not add cleanup that could race with other
# parallel runs in the same tenant.

user_prompt: |
  There is an active incident with the 'checkout-api' service. I need you to
  spin up a Microsoft Teams group chat for the responders so we can
  coordinate the investigation.

  Please:
  1. Search the Teams directory for any two users you can find (pick any
     two distinct users).
  2. Create a new Microsoft Teams group chat that includes those two users.
     The chat topic must start with 'holmes-eval-257-' and end with a
     unique suffix you choose (any random string works).
  3. Post an initial message to the chat with the text:
     "Investigation started for the checkout-api incident. Reference: HLMS257-V3R1FY"
  4. Report the chat topic you chose and the chat ID that was created.

expected_output:
  - "Must have called a tool to search for users in the directory"
  - "Must have called create_chat (or equivalent) to create a new group chat"
  - "Must have called a tool to post a message to the newly created chat"
  - "Must have posted a message containing the verification code HLMS257-V3R1FY"
  - "Must report back the chat topic (starting with 'holmes-eval-257-') and the chat ID"

include_tool_calls: true

tags:
  - mcp
  - integration
  - fast
  - hard
  - question-answer

before_test: |
  set -e

  # Validate required environment variable
  [ -n "${TEAMS_TOKEN_CACHE_TGZ_B64:-}" ] || { echo "Missing env var: TEAMS_TOKEN_CACHE_TGZ_B64 (base64 of tar.gz with floriscornel token cache + auth metadata)"; exit 1; }

  # Decode the tarball into HOME. The MCP expects:
  #   $HOME/.teams-mcp-token-cache.json  (access + refresh tokens)
  #   $HOME/.msgraph-mcp-auth.json       (client id, tenant, scopes)
  # The MCP auto-refreshes access tokens from the cached refresh token.
  echo "${TEAMS_TOKEN_CACHE_TGZ_B64}" | base64 -d | tar -xzf - -C "${HOME}"
  [ -f "${HOME}/.teams-mcp-token-cache.json" ] || { echo "Cache file missing after extract"; exit 1; }
  chmod 600 "${HOME}/.teams-mcp-token-cache.json"
  [ -f "${HOME}/.msgraph-mcp-auth.json" ] && chmod 600 "${HOME}/.msgraph-mcp-auth.json" || true

  echo "Setup complete"

# No after_test — each run creates a unique chat; leave them in place to
# avoid races between parallel runs. See CLAUDE.md "Cloud Service Eval Reentrancy".
