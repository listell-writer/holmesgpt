user_prompt:
  - "Find the deployment runbook page in Confluence and summarize it."

expected_output:
  - "Must clearly tell the user that the Confluence toolset is unavailable, failed to load, or is misconfigured (the user should NOT be told the request was satisfied)"
  - "Must reference the underlying error indicating: validation error / user/email required for Confluence Cloud"
  - "Must guide the user on how to fix the Confluence toolset configuration (e.g. set the missing/required field, fix the typo, or update the YAML)"

# This eval intentionally configures the toolset to fail. allow_toolset_failures
# lets the test framework continue past the prereq error so the LLM actually runs.
allow_toolset_failures: true

tags:
  - transparency
  - hard
