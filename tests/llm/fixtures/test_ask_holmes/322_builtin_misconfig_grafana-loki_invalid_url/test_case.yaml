user_prompt:
  - "Query Loki for application logs containing 'panic' across the production namespace in the last 30 minutes."

expected_output:
  - "Must clearly tell the user that the Grafana Loki toolset is unavailable, failed to load, or is misconfigured (the user should NOT be told the request was satisfied)"
  - "Must reference the underlying error indicating: Unable to connect / connection refused"
  - "Must guide the user to verify the Grafana Loki toolset configuration (e.g. confirm the URL/host is reachable, the credentials are correct, or the value matches expectations)"

# This eval intentionally configures the toolset to fail. allow_toolset_failures
# lets the test framework continue past the prereq error so the LLM actually runs.
allow_toolset_failures: true

tags:
  - transparency
  - hard
