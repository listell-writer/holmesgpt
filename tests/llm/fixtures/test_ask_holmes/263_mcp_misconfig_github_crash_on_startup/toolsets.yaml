toolsets:
  github-mcp:
    type: mcp
    enabled: true
    description: "GitHub MCP server for github operations"
    config:
      mode: stdio
      command: "python3"
      args:
        - "-c"
        - "import sys; sys.stderr.write('FATAL: required environment variable GITHUB_PERSONAL_ACCESS_TOKEN is not set; cannot start GitHub MCP server\n'); sys.exit(1)"
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
