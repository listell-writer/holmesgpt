# Test: Microsoft Teams (native toolset) - Holmes creates a chat + posts notes
# Verifies the end-to-end incident-chat-start flow via the native Teams
# toolset using a delegated Microsoft Graph access token. Holmes is asked
# to search the directory for responders, create a new group chat with a
# unique topic, and post a message containing an incident reference code.
#
# Scope limited to chat-level delegated Graph scopes — no channel or team
# admin permissions needed:
#   User.Read, User.ReadBasic.All, Chat.ReadWrite, ChatMessage.Send
#
# Requirements (env vars):
#   TEAMS_AUTH_TOKEN  - Pre-minted delegated Microsoft Graph access token.
#                       Graph access tokens expire in ~1h; refresh the secret
#                       before runs. Mint via scripts/get_teams_token.py or
#                       any MSAL/Graph client. The toolset does not care which
#                       Entra client minted it.
#   TEAMS_TEST_MEMBER - Comma-separated list of UPNs (emails) to include as
#                       chat members (e.g. "alice@tenant.com,bob@tenant.com").
#                       The prompt tells Holmes to look up each and add them
#                       to the group chat. At least 2 members required for
#                       a group chat (token user is added automatically).
#
# Reentrancy: each run creates a NEW chat with a Holmes-chosen unique topic
# suffix, so parallel runs never collide on the same resource. after_test
# is intentionally omitted — chats are lightweight and accumulate harmlessly;
# do not add cleanup that could race with other parallel runs in the same
# tenant.

user_prompt: |
  There is an active incident with the 'checkout-api' service. I need you to
  spin up a Microsoft Teams group chat for the responders so we can
  coordinate the investigation.

  Please:
  1. Look up each of the following responders in the Teams directory:
     {{ env.TEAMS_TEST_MEMBER }}
  2. Create a new Microsoft Teams group chat that includes all of them.
     The chat topic must start with 'holmes-eval-257-' and end with a
     unique suffix you choose (any random string works).
  3. Post an initial message to the chat with the text:
     "Investigation started for the checkout-api incident. Reference: HLMS257-V3R1FY"
  4. Report the chat topic you chose and the chat ID that was created.

expected_output:
  - "Must have called teams_search_users (once per responder) to resolve each of {{ env.TEAMS_TEST_MEMBER }} to a user id"
  - "Must have called teams_create_chat with chat_type 'group', all resolved user ids, and a topic starting with 'holmes-eval-257-'"
  - "Must have called teams_send_chat_message to post a message containing 'HLMS257-V3R1FY'"
  - "Must report the chat topic (starting with 'holmes-eval-257-') and the chat ID"

include_tool_calls: true

tags:
  - integration
  - fast
  - hard
  - question-answer

before_test: |
  set -e

  [ -n "${TEAMS_AUTH_TOKEN:-}" ] || { echo "Missing env var: TEAMS_AUTH_TOKEN (delegated Graph access token)"; exit 1; }

  # Quick sanity check: does the token work against /me?
  HTTP=$(curl -sS -o /tmp/teams_eval_me.json -w "%{http_code}" \
    https://graph.microsoft.com/v1.0/me \
    -H "Authorization: Bearer ${TEAMS_AUTH_TOKEN}")

  if [ "${HTTP}" != "200" ]; then
    echo "Graph /me returned HTTP ${HTTP}: $(cat /tmp/teams_eval_me.json 2>/dev/null)"
    echo "Check that TEAMS_AUTH_TOKEN is a valid, non-expired Graph delegated access token"
    echo "with scopes: User.Read, User.ReadBasic.All, Chat.ReadWrite, ChatMessage.Send"
    rm -f /tmp/teams_eval_me.json
    exit 1
  fi
  rm -f /tmp/teams_eval_me.json
  echo "Setup complete"

# No after_test — see reentrancy note at the top of this file.
