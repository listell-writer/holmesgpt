user_prompt: |
  Query the Confluence space with key 'HOLMES213' and tell me the space name and space ID.

expected_output:
  - "Must report the space name: Holmes Test Space 213"
  - "Must report the space ID as a number"

tags:
  - confluence
  - question-answer
  - medium

before_test: |
  set -e

  SPACE_KEY="HOLMES213"
  SPACE_NAME="Holmes Test Space 213"

  echo "Creating Confluence space ${SPACE_KEY}..."
  RESPONSE=$(curl -L -s -w "\n%{http_code}" -X POST \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/space" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}" \
    -H "Content-Type: application/json" \
    -d "{
      \"key\": \"${SPACE_KEY}\",
      \"name\": \"${SPACE_NAME}\",
      \"description\": {
        \"plain\": {
          \"value\": \"Test space for Holmes eval 213\",
          \"representation\": \"plain\"
        }
      }
    }")

  HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
  BODY=$(echo "$RESPONSE" | sed '$d')

  if [ "$HTTP_CODE" -eq 200 ]; then
    SPACE_ID=$(echo "$BODY" | grep -o '"id":[0-9]*' | head -1 | cut -d: -f2)
    echo "Space created with ID: ${SPACE_ID}"
  elif echo "$BODY" | grep -q "already exists"; then
    echo "Space already exists, reusing."
  else
    echo "Failed to create space. HTTP ${HTTP_CODE}: ${BODY}"
    exit 1
  fi

  echo "Verifying space exists..."
  VERIFY=$(curl -s -w "%{http_code}" -o /dev/null \
    "${CONFLUENCE_SA_BASE_URL}/wiki/rest/api/space/${SPACE_KEY}" \
    -H "Authorization: Bearer ${CONFLUENCE_SA_API_KEY}")

  if [ "$VERIFY" -ne 200 ]; then
    echo "Space verification failed with HTTP ${VERIFY}"
    exit 1
  fi

  echo "Setup complete"

after_test: |
  # Confluence space HOLMES213 has a static, test-ID-scoped key that another
  # parallel CI run may currently be using. Deleting it would wipe the space
  # and break the in-flight run. before_test is idempotent (creates-or-reuses),
  # so we skip cleanup. The space accumulates across runs, which is the
  # intended reentrant behaviour.
  echo "Skipping space cleanup (reentrant - before_test handles idempotent setup)"
