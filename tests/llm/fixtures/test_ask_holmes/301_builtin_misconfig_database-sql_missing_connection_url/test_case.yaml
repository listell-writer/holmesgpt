user_prompt:
  - "Query the database for the count of users created in the last 24 hours."

expected_output:
  - "Must clearly tell the user that the SQL Database toolset is unavailable, failed to load, or is misconfigured (the user should NOT be told the request was satisfied)"
  - "Must reference the underlying error indicating: validation error / connection_url required"
  - "Must guide the user on how to fix the SQL Database toolset configuration (e.g. set the missing/required field, fix the typo, or update the YAML)"

# This eval intentionally configures the toolset to fail. allow_toolset_failures
# lets the test framework continue past the prereq error so the LLM actually runs.
allow_toolset_failures: true

tags:
  - transparency
  - hard
