toolsets:
  k8sremediation-mcp:
    type: mcp
    enabled: true
    description: "Kubernetes Remediation MCP server for kubernetes remediation operations"
    config:
      mode: stdio
      command: "python3"
      args:
        - "-c"
        - "import sys; sys.stderr.write('FATAL: required environment variable KUBECONFIG is not set; cannot start Kubernetes Remediation MCP server\n'); sys.exit(1)"
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
