user_prompt:
  - "Look up the latest open incidents assigned to the Platform team in ServiceNow."

expected_output:
  - "Must clearly tell the user that the ServiceNow toolset is unavailable, failed to load, or is misconfigured (the user should NOT be told the request was satisfied)"
  - "Must reference the underlying error indicating: 401 / Unauthorized / authentication failed"
  - "Must guide the user to verify the ServiceNow toolset configuration (e.g. confirm the URL/host is reachable, the credentials are correct, or the value matches expectations)"

# This eval intentionally configures the toolset to fail. allow_toolset_failures
# lets the test framework continue past the prereq error so the LLM actually runs.
allow_toolset_failures: true

tags:
  - transparency
  - hard
