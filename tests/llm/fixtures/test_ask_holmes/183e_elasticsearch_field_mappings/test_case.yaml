# Test: Elasticsearch Field Mappings Discovery
# Tests that Holmes can retrieve and interpret index mappings/schema
#
# Requirements:
# - ELASTICSEARCH_URL: URL to Elasticsearch cluster
# - ELASTICSEARCH_API_KEY: API key for authentication
#
# Anti-hallucination: The test creates an index with specific field names and types.
# The LLM cannot know this schema without querying the mappings API.
# Fields include nested objects and specific types that must be correctly reported.

user_prompt: "What are the field mappings for the 'app-183e-transactions' index? List all fields with their data types."

expected_output:
  - "Must identify the 'transaction_id' field as type keyword"
  - "Must identify the 'amount' field as type double"
  - "Must identify the 'metadata.region' nested field as type keyword"
  - "Must identify the 'metadata.priority' nested field as type integer"
  - "Must identify the 'processed_at' field as type date"

tags:
  - elasticsearch
  - question-answer
  - medium

setup_timeout: 300

before_test: |
  source ../../shared/es_test_utils.sh
  es_setup
  set -e


  export HOLMES_ES_TEST_INDEX="app-183e-transactions"

  # Reentrancy: index name is static and shared with parallel CI runs of
  # this eval. Do NOT delete - that would wipe a parallel run's data.
  # Create-or-reuse instead. The mapping is fixed at index creation, so
  # reusing an existing index is safe.
  echo "⏳ Creating (or reusing) test index with specific schema..."
  RESPONSE=$(curl -s -X PUT "${ELASTICSEARCH_URL}/${HOLMES_ES_TEST_INDEX}?wait_for_active_shards=1" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{
      "settings": {
        "number_of_shards": 1,
        "number_of_replicas": 0
      },
      "mappings": {
        "properties": {
          "transaction_id": {"type": "keyword"},
          "amount": {"type": "double"},
          "currency": {"type": "keyword"},
          "status": {"type": "keyword"},
          "metadata": {
            "properties": {
              "region": {"type": "keyword"},
              "priority": {"type": "integer"},
              "tags": {"type": "keyword"}
            }
          },
          "processed_at": {"type": "date"},
          "description": {"type": "text"}
        }
      }
    }')

  if echo "$RESPONSE" | grep -qE '"acknowledged":true|resource_already_exists_exception'; then
    echo "✅ Test index ready with custom schema"
  else
    echo "❌ Failed to create test index: $RESPONSE"
    exit 1
  fi

  sleep 2

  # Index a sample document with a stable _id so concurrent runs converge on
  # the same document instead of stacking duplicates.
  curl -sf -X PUT "${ELASTICSEARCH_URL}/${HOLMES_ES_TEST_INDEX}/_doc/seed-1" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{
      "transaction_id": "TXN-12345",
      "amount": 99.99,
      "currency": "USD",
      "status": "completed",
      "metadata": {
        "region": "us-east-1",
        "priority": 1,
        "tags": ["retail", "online"]
      },
      "processed_at": "2025-01-01T10:00:00Z",
      "description": "Test transaction for schema validation"
    }' > /dev/null

  # Refresh
  curl -sf -X POST "${ELASTICSEARCH_URL}/${HOLMES_ES_TEST_INDEX}/_refresh" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" > /dev/null

  echo "✅ Test index ready with mappings: transaction_id (keyword), amount (double), metadata.region (keyword), metadata.priority (integer), processed_at (date)"

after_test: |
  # Index uses a static test-ID-scoped name (app-183e-transactions). Parallel
  # CI runs share the same Elasticsearch cluster, so we skip deletion to
  # avoid removing the index while another run still depends on it.
  # before_test is idempotent (create-or-reuse + stable doc _id).
  echo "✅ Skipping index cleanup (reentrant - before_test handles idempotent setup)"
