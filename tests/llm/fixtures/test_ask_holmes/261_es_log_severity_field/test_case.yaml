# Test: ES log severity field is named "severity" not "level"
#
# This eval forces a real failed→succeeded tool-call correction. The test
# index contains 10 ERROR-severity documents, but they use a custom
# "severity" field instead of the standard "level" field used by most
# log schemas. A fresh LLM defaulting to a level:"ERROR" query returns
# zero hits; the only way to find the data is to inspect the mapping or
# a sample doc, then re-query with severity:"ERROR".
#
# On suggest=on the LLM should capture this lesson as an env-specific
# memory ("this index uses 'severity' for log levels, not 'level'").

user_prompt: "Search the elasticsearch index 'app-261-logs-trk8m2p9' and tell me how many error-level log entries exist in it."

expected_output:
  - "There are 10 error-level log entries in app-261-logs-trk8m2p9"

memories_generated: true

tags:
  - elasticsearch
  - question-answer
  - medium
  - regression

setup_timeout: 300

before_test: |
  source ../../shared/es_test_utils.sh
  es_setup
  set -e

  export HOLMES_ES_TEST_INDEX="app-261-logs-trk8m2p9"
  echo "Using test index: $HOLMES_ES_TEST_INDEX"

  # Clean up any existing index first
  curl -sf -X DELETE "${ELASTICSEARCH_URL}/${HOLMES_ES_TEST_INDEX}" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true

  echo "⏳ Creating test index with explicit mapping (severity, not level)..."

  # Create the index with explicit mapping — note: NO "level" field exists,
  # only "severity". This is the env-specific quirk this eval teaches.
  CREATE_RESPONSE=$(curl -sf -X PUT "${ELASTICSEARCH_URL}/${HOLMES_ES_TEST_INDEX}?wait_for_active_shards=1" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{
      "settings": { "number_of_shards": 1, "number_of_replicas": 0 },
      "mappings": {
        "properties": {
          "severity": { "type": "keyword" },
          "message":  { "type": "text" },
          "service":  { "type": "keyword" },
          "@timestamp": { "type": "date" }
        }
      }
    }')

  if ! echo "$CREATE_RESPONSE" | grep -q '"acknowledged":true'; then
    echo "❌ Failed to create index: $CREATE_RESPONSE"
    exit 1
  fi
  sleep 2

  # 10 ERROR, 5 WARN, 15 INFO — all using the "severity" field.
  BULK_DATA=""
  for i in $(seq 1 10); do
    BULK_DATA="${BULK_DATA}{\"index\":{}}\n{\"severity\":\"ERROR\",\"service\":\"checkout-261\",\"message\":\"DB connection refused $i\",\"@timestamp\":\"2026-05-14T12:00:0${i}Z\"}\n"
  done
  for i in $(seq 1 5); do
    BULK_DATA="${BULK_DATA}{\"index\":{}}\n{\"severity\":\"WARN\",\"service\":\"checkout-261\",\"message\":\"Slow query $i\",\"@timestamp\":\"2026-05-14T12:01:0${i}Z\"}\n"
  done
  for i in $(seq 1 15); do
    BULK_DATA="${BULK_DATA}{\"index\":{}}\n{\"severity\":\"INFO\",\"service\":\"checkout-261\",\"message\":\"Health check $i\",\"@timestamp\":\"2026-05-14T12:02:0${i}Z\"}\n"
  done

  BULK_RESPONSE=$(echo -e "$BULK_DATA" | curl -sf -X POST "${ELASTICSEARCH_URL}/${HOLMES_ES_TEST_INDEX}/_bulk" \
    -H "Content-Type: application/x-ndjson" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    --data-binary @-)

  if echo "$BULK_RESPONSE" | grep -q '"errors":true'; then
    echo "❌ Bulk insert had errors: $BULK_RESPONSE"
    exit 1
  fi

  curl -sf -X POST "${ELASTICSEARCH_URL}/${HOLMES_ES_TEST_INDEX}/_refresh" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" > /dev/null

  DOC_COUNT=$(curl -sf -X GET "${ELASTICSEARCH_URL}/${HOLMES_ES_TEST_INDEX}/_count" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" | grep -o '"count":[0-9]*' | cut -d':' -f2)

  if [ "$DOC_COUNT" = "30" ]; then
    echo "✅ Index created with $DOC_COUNT docs (10 ERROR / 5 WARN / 15 INFO) using 'severity' field"
  else
    echo "❌ Expected 30 documents, found: $DOC_COUNT"
    exit 1
  fi

after_test: |
  echo "⏳ Cleaning up test index: app-261-logs-trk8m2p9"
  curl -sf -X DELETE "${ELASTICSEARCH_URL}/app-261-logs-trk8m2p9" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true
  echo "✅ Cleanup complete"
