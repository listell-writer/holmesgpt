user_prompt: "How many replicas of the payment-api service are running and ready in the app-259 namespace?"
description: |
  This eval forces an env-specific tool-call correction. The deployment that
  serves "payment-api" is named "pmt-svc-v2" (so name-based grep fails) and
  the only label that identifies it as payment-api is the team's custom
  "acme.io/service=payment-api" label — the standard "app=" label is absent.
  A fresh LLM that defaults to `-l app=payment-api` will get an empty list
  and must discover the custom label via `--show-labels` (or list-labels),
  then re-query with `-l acme.io/service=payment-api` to get the right
  answer. On the suggest_runbooks=on matrix variant the LLM should emit
  exactly that lesson; on suggest=off it should still answer correctly.
expected_output:
  - There are 3 ready payment-api replicas running in app-259
memories_generated: true
before_test: |
  kubectl create namespace app-259 || true

  # Several unrelated deployments in the namespace so the LLM cannot guess
  # the answer without actually filtering by the team's custom label.
  cat <<'EOF' | kubectl apply -f -
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: pmt-svc-v2
    namespace: app-259
    labels:
      acme.io/service: payment-api
  spec:
    replicas: 3
    selector:
      matchLabels:
        acme.io/service: payment-api
    template:
      metadata:
        labels:
          acme.io/service: payment-api
      spec:
        containers:
        - name: app
          image: registry.k8s.io/pause:3.10
  ---
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: usr-svc-v1
    namespace: app-259
    labels:
      acme.io/service: user-api
  spec:
    replicas: 2
    selector:
      matchLabels:
        acme.io/service: user-api
    template:
      metadata:
        labels:
          acme.io/service: user-api
      spec:
        containers:
        - name: app
          image: registry.k8s.io/pause:3.10
  ---
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: ck-svc-v3
    namespace: app-259
    labels:
      acme.io/service: checkout-api
  spec:
    replicas: 2
    selector:
      matchLabels:
        acme.io/service: checkout-api
    template:
      metadata:
        labels:
          acme.io/service: checkout-api
      spec:
        containers:
        - name: app
          image: registry.k8s.io/pause:3.10
  EOF

  # Wait for the payment-api pods to be ready
  READY=false
  for i in {1..60}; do
    if [ "$(kubectl get pods -n app-259 -l acme.io/service=payment-api -o json | jq '[.items[] | select(.status.conditions[]? | select(.type=="Ready" and .status=="True"))] | length')" = "3" ]; then
      echo "✅ All 3 payment-api pods are ready"
      READY=true
      break
    fi
    sleep 1
  done
  if [ "$READY" = false ]; then
    echo "❌ payment-api pods failed to become ready"
    kubectl get pods -n app-259
    exit 1
  fi
after_test: |
  kubectl delete namespace app-259 || true
tags:
  - kubernetes
  - easy
  - regression
