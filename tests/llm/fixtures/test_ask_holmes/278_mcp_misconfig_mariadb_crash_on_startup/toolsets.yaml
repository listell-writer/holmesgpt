toolsets:
  mariadb-mcp:
    type: mcp
    enabled: true
    description: "MariaDB MCP server for mariadb operations"
    config:
      mode: stdio
      command: "python3"
      args:
        - "-c"
        - "import sys; sys.stderr.write('FATAL: required environment variable MARIADB_PASSWORD is not set; cannot start MariaDB MCP server\n'); sys.exit(1)"
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
