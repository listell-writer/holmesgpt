# Read-only Kubernetes observability (logs, events, describe, get) is all that's
# needed to read the service logs and the catalog-config ConfigMap. bash/internet/
# connectivity_check are disabled: it matches a realistic read-only setup and
# closes the eval-integrity hole where a shell lets the agent read the test fixture
# files on disk instead of investigating the live cluster.
toolsets:
  kubernetes/core:
    enabled: true
  kubernetes/logs:
    enabled: true
  internet:
    enabled: false
  connectivity_check:
    enabled: false
  bash:
    enabled: false
