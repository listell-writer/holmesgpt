toolsets:
  sentry-mcp:
    type: mcp
    enabled: true
    description: "Sentry MCP server for sentry operations"
    config:
      mode: stdio
      command: "python3"
      args:
        - "-c"
        - "import sys; sys.stderr.write('FATAL: required environment variable SENTRY_AUTH_TOKEN is not set; cannot start Sentry MCP server\n'); sys.exit(1)"
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
