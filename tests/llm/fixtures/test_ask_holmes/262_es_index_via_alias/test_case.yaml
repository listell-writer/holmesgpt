# Test: ES "prod" logs are exposed only via an alias, not by the obvious
# index name.
#
# The real backing index is "app-262-prodlogs-2026.05-q9k4f7vx". It is the
# ONLY backing index for the alias "app-262-prodlogs". The obvious guesses
# a fresh LLM would try (production, prod-logs, app-262-prod-logs,
# app-262-production-logs, ...) all 404. The correction path is:
#   GET /_alias/app-262-prodlogs   → reveals the real index
#   then query the alias to get docs.
#
# On suggest=on the LLM should capture: "in this environment, prod logs
# are reached via the 'app-262-prodlogs' alias; the raw index name is a
# date-stamped rotation pattern, do NOT query it directly."

user_prompt: "How many documents are in the 'app-262-prodlogs' production logs in elasticsearch?"

expected_output:
  - "There are 8 documents in app-262-prodlogs"

memories_generated: true

tags:
  - elasticsearch
  - question-answer
  - medium
  - regression

setup_timeout: 300

before_test: |
  source ../../shared/es_test_utils.sh
  es_setup
  set -e

  ALIAS="app-262-prodlogs"
  INDEX="app-262-prodlogs-2026.05-q9k4f7vx"

  curl -sf -X DELETE "${ELASTICSEARCH_URL}/${INDEX}" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true

  echo "⏳ Creating index ${INDEX}..."
  CREATE_RESPONSE=$(curl -sf -X PUT "${ELASTICSEARCH_URL}/${INDEX}?wait_for_active_shards=1" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d '{"settings": {"number_of_shards": 1, "number_of_replicas": 0}}')
  if ! echo "$CREATE_RESPONSE" | grep -q '"acknowledged":true'; then
    echo "❌ Failed to create index: $CREATE_RESPONSE"
    exit 1
  fi
  sleep 2

  # Bind the alias so the only discoverable handle is "app-262-prodlogs".
  echo "⏳ Creating alias ${ALIAS} -> ${INDEX}..."
  ALIAS_RESPONSE=$(curl -sf -X POST "${ELASTICSEARCH_URL}/_aliases" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d "{\"actions\":[{\"add\":{\"index\":\"${INDEX}\",\"alias\":\"${ALIAS}\"}}]}")
  if ! echo "$ALIAS_RESPONSE" | grep -q '"acknowledged":true'; then
    echo "❌ Failed to create alias: $ALIAS_RESPONSE"
    exit 1
  fi

  # 8 documents
  BULK_DATA=""
  for i in $(seq 1 8); do
    BULK_DATA="${BULK_DATA}{\"index\":{}}\n{\"message\":\"prod log line $i\",\"@timestamp\":\"2026-05-14T12:00:0${i}Z\"}\n"
  done
  BULK_RESPONSE=$(echo -e "$BULK_DATA" | curl -sf -X POST "${ELASTICSEARCH_URL}/${INDEX}/_bulk" \
    -H "Content-Type: application/x-ndjson" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    --data-binary @-)
  if echo "$BULK_RESPONSE" | grep -q '"errors":true'; then
    echo "❌ Bulk insert had errors: $BULK_RESPONSE"
    exit 1
  fi

  curl -sf -X POST "${ELASTICSEARCH_URL}/${INDEX}/_refresh" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" > /dev/null

  # Verify alias resolves and count is right
  COUNT=$(curl -sf -X GET "${ELASTICSEARCH_URL}/${ALIAS}/_count" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" | grep -o '"count":[0-9]*' | cut -d':' -f2)
  if [ "$COUNT" = "8" ]; then
    echo "✅ Alias ${ALIAS} resolves to ${INDEX} with 8 docs"
  else
    echo "❌ Expected 8 documents via alias, found: $COUNT"
    exit 1
  fi

after_test: |
  ALIAS="app-262-prodlogs"
  INDEX="app-262-prodlogs-2026.05-q9k4f7vx"
  # Remove alias first then index — best-effort, ignore failures.
  curl -sf -X POST "${ELASTICSEARCH_URL}/_aliases" \
    -H "Content-Type: application/json" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" \
    -d "{\"actions\":[{\"remove\":{\"index\":\"${INDEX}\",\"alias\":\"${ALIAS}\"}}]}" || true
  curl -sf -X DELETE "${ELASTICSEARCH_URL}/${INDEX}" \
    -H "Authorization: ApiKey ${ELASTICSEARCH_API_KEY}" || true
  echo "✅ Cleanup complete"
