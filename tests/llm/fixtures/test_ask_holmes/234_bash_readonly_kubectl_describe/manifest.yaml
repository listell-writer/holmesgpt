apiVersion: apps/v1
kind: Deployment
metadata:
  name: data-pipeline
  namespace: app-234
  labels:
    app: data-pipeline
    team: platform
  annotations:
    release-tag: "v4.7.2-rc.h8q3nw"
    owner: "platform-team"
    config-hash: "sha256:9f4e2a71bc"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: data-pipeline
  template:
    metadata:
      labels:
        app: data-pipeline
        team: platform
    spec:
      containers:
        - name: worker
          image: busybox:1.36
          command: ["sleep", "3600"]
          resources:
            limits:
              memory: "32Mi"
              cpu: "50m"
