toolsets:
  grafana-mcp:
    type: mcp
    enabled: true
    description: "Grafana MCP server for grafana operations"
    config:
      mode: stdio
      command: "python3"
      args:
        - "-c"
        - "import sys; sys.stderr.write('FATAL: required environment variable GRAFANA_API_KEY is not set; cannot start Grafana MCP server\n'); sys.exit(1)"
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
