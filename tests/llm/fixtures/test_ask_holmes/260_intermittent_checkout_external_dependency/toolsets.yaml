# This eval's premise is that the root cause lives behind an EXTERNAL payment
# provider that Holmes has no way to inspect. To make that airtight we keep the
# Kubernetes observability toolsets (logs, events, describe) but DISABLE every
# toolset that would let Holmes actively probe the outside world — otherwise it
# can shell out to curl/dig the external host or run connectivity checks, which
# changes the scenario. With these disabled, Holmes can see the timeout symptom
# in the logs but genuinely cannot gather data about the external dependency,
# the network path, or the app's own outbound settings.
toolsets:
  kubernetes/core:
    enabled: true
  kubernetes/logs:
    enabled: true
  internet:
    enabled: false
  connectivity_check:
    enabled: false
  bash:
    enabled: false
