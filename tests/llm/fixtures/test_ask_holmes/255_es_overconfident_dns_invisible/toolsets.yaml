toolsets:
  elasticsearch/data:
    enabled: true
    config:
      url: "{{ env.ELASTICSEARCH_URL }}"
      api_key: "{{ env.ELASTICSEARCH_API_KEY }}"
      verify_ssl: true
  elasticsearch/cluster:
    enabled: true
    config:
      url: "{{ env.ELASTICSEARCH_URL }}"
      api_key: "{{ env.ELASTICSEARCH_API_KEY }}"
      verify_ssl: true
  helm/core:
    enabled: false
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
