user_prompt: "Scan all deployments in this cluster for hardcoded passwords or API keys in environment variables. Report any findings and how to fix them."

# Holmes should find plaintext secrets on both the fake Holmes deployment AND the
# other app, but for the Holmes deployment it should provide specific remediation
# advice about using Helm valueFrom.secretKeyRef.
include_tool_calls: true
expected_output:
  - Must call kubernetes_jq_query tool successfully
  - "holmesgpt"
  - "OPENAI_API_KEY"
  - "payment-gateway"
  - "STRIPE_SECRET_KEY"
  - Must recommend using valueFrom or secretKeyRef for the holmesgpt deployment
  - Must mention Helm values or additionalEnvVars

tags:
  - kubernetes
  - medium

before_test: |
  kubectl create namespace app-254 --save-config --dry-run=client -o yaml | kubectl apply -f - || true

  cat <<'EOF' | kubectl apply -f -
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: holmesgpt
    namespace: app-254
    labels:
      app: holmes
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: holmes
    template:
      metadata:
        labels:
          app: holmes
      spec:
        containers:
        - name: holmes
          image: busybox:1.36
          command: ["sleep", "3600"]
          env:
          - name: OPENAI_API_KEY
            value: "T3BlbkFJ9x7mR2qW4vN8pL5sXdummy"
          - name: LOG_LEVEL
            value: "INFO"
          - name: ENABLE_TELEMETRY
            value: "true"
  ---
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: payment-gateway
    namespace: app-254
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: payment-gateway
    template:
      metadata:
        labels:
          app: payment-gateway
      spec:
        containers:
        - name: gateway
          image: busybox:1.36
          command: ["sleep", "3600"]
          env:
          - name: STRIPE_SECRET_KEY
            value: "whsec_4eC39HqLyjWDarjtT1zdp7dc"
          - name: SERVICE_PORT
            value: "8443"
  ---
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: analytics-worker
    namespace: app-254
  spec:
    replicas: 1
    selector:
      matchLabels:
        app: analytics-worker
    template:
      metadata:
        labels:
          app: analytics-worker
      spec:
        containers:
        - name: worker
          image: busybox:1.36
          command: ["sleep", "3600"]
          env:
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: analytics-db-creds
                key: password
          - name: APP_NAME
            value: "analytics-worker"
  EOF

  READY=false
  for i in {1..60}; do
    COUNT=$(kubectl get deployments -n app-254 --no-headers 2>/dev/null | wc -l)
    if [ "$COUNT" -ge 3 ]; then
      echo "✅ All 3 deployments created in app-254"
      READY=true
      break
    fi
    echo "⏳ Attempt $i/60: $COUNT/3 deployments found..."
    sleep 1
  done
  if [ "$READY" = false ]; then
    echo "❌ Deployments not created after 60s"
    kubectl get deployments -n app-254
    exit 1
  fi

  # Verify data is queryable
  VERIFY=$(kubectl get deployments -n app-254 -o json | jq -r '.items[] | .spec.template.spec.containers[] | .env // [] | .[] | select(.value != null and (.valueFrom == null)) | select(.name | test("PASSWORD|SECRET|API_KEY|CREDENTIAL"; "i")) | .name')
  if echo "$VERIFY" | grep -q "OPENAI_API_KEY" && echo "$VERIFY" | grep -q "STRIPE_SECRET_KEY"; then
    echo "✅ Verification: found OPENAI_API_KEY and STRIPE_SECRET_KEY via jq query"
  else
    echo "❌ Verification failed"
    echo "Got: $VERIFY"
    exit 1
  fi

after_test: |
  kubectl delete namespace app-254 || true
