user_prompt: >
  Across the namespaces app-259-frontend, app-259-backend, app-259-data and
  app-259-control, count how many pods carry the label tier=worker in each of
  those four namespaces, and tell me which namespace has the most worker pods.
  Some pods in each namespace have other tier labels (edge, messaging, gateway,
  batch, observability), so make sure you are filtering only tier=worker.

# Both criteria matter:
# 1. Holmes must arrive at the correct per-namespace counts and winner.
# 2. Holmes must do this using dedicated Kubernetes tools, not a bash pipeline
#    with awk/sort/uniq/wc, because that pattern requires user approval and is
#    the slower, less reliable path.
include_tool_calls: true
expected_output:
  - "Must report app-259-frontend has 3 pods with tier=worker"
  - "Must report app-259-backend has 1 pod with tier=worker"
  - "Must report app-259-data has 2 pods with tier=worker"
  - "Must report app-259-control has 4 pods with tier=worker"
  - "Must identify app-259-control as the namespace with the most worker pods"
  - "Must answer using the dedicated Kubernetes tools (one or more of
     kubernetes_jq_query, kubernetes_tabular_query, kubernetes_count, or
     kubectl_find_resource), OR by issuing direct per-namespace kubectl get
     calls through the bash tool (one call per namespace is acceptable)."
  - "Must NOT use the bash tool with shell pipelines that aggregate or group
     results (for example: piping kubectl output through awk, sort, uniq -c,
     or wc to compute grouped counts). The grouping/aggregation must be done
     by a dedicated Kubernetes tool or by reading the kubectl output directly,
     not by composing a shell pipeline."

tags:
  - kubernetes
  - kubernetes-no-bash-approval
  - counting
  - hard

before_test: |
  set -e
  kubectl apply -f manifest.yaml

  # Wait for the API to reflect all pods (labels are queryable as soon as the
  # Pod object exists; container runtime state does not matter for this eval).
  READY=false
  for i in $(seq 1 60); do
    TOTAL=$(kubectl get pods -A -o json | jq '
      [.items[] | select(.metadata.namespace | startswith("app-259-"))] | length')
    if [ "$TOTAL" -eq 15 ]; then
      READY=true
      break
    fi
    sleep 1
  done
  if [ "$READY" = false ]; then
    echo "ERROR: expected 15 pods across app-259-*, got $TOTAL"
    kubectl get pods -A | grep app-259- || true
    exit 1
  fi

  # Verify the per-namespace tier=worker counts before letting the test ask Holmes.
  for NS_EXPECT in "app-259-frontend:3" "app-259-backend:1" "app-259-data:2" "app-259-control:4"; do
    NS="${NS_EXPECT%:*}"
    EXPECT="${NS_EXPECT##*:}"
    ACTUAL=$(kubectl get pods -n "$NS" -l tier=worker -o json | jq '.items | length')
    if [ "$ACTUAL" -ne "$EXPECT" ]; then
      echo "ERROR: $NS expected $EXPECT tier=worker pods, got $ACTUAL"
      exit 1
    fi
    echo "$NS: $ACTUAL worker pods"
  done

after_test: |
  kubectl delete namespace app-259-frontend app-259-backend app-259-data app-259-control --ignore-not-found
