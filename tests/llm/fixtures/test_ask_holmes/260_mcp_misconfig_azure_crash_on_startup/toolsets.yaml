toolsets:
  azure-mcp:
    type: mcp
    enabled: true
    description: "Azure MCP server for azure operations"
    config:
      mode: stdio
      command: "python3"
      args:
        - "-c"
        - "import sys; sys.stderr.write('FATAL: required environment variable AZURE_CLIENT_ID is not set; cannot start Azure MCP server\n'); sys.exit(1)"
  kubernetes/core:
    enabled: false
  kubernetes/logs:
    enabled: false
  helm/core:
    enabled: false
