# Datadog toolset configuration for the 260_alert_anchored_* family.
# Holmes must query Datadog logs scoped to the alert time supplied in the
# user prompt.

toolsets:

  datadog/logs:
    enabled: true
    config:
      api_key: "{{env.DATADOG_API_KEY}}"
      app_key: "{{env.DATADOG_APP_KEY}}"
      api_url: "https://api.us5.datadoghq.com"
      indexes:
        - "*"
      storage_tier: indexes
      page_size: 300
      default_limit: 1000
